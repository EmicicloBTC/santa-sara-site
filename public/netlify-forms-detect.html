<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Netlify form detect</title>
  </head>
  <body>
    <!-- Pagina statica solo per il rilevamento form Netlify al deploy (non linkata dal sito). -->
    <form
      name="contact"
      method="POST"
      action="/netlify-forms-detect.html"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="country" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
